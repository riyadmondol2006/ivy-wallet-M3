name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    # Auto-trigger only on the version-bump commits created by automatic_release.yml.
    # workflow_dispatch bypasses this check so you can trigger a manual release any time.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (contains(github.event.head_commit.message, 'Automatic release') &&
       github.event.head_commit.author.name == 'GitHub Actions')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'version-name =' gradle/libs.versions.toml | awk -F'"' '{print $2}')
          VERSION_CODE=$(grep 'version-code =' gradle/libs.versions.toml | awk -F'"' '{print $2}')
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-${VERSION_CODE}" >> $GITHUB_OUTPUT

      # Decode the base64-encoded keystore stored in the SIGNING_KEYSTORE secret.
      # To encode your keystore: base64 -i sign.jks | pbcopy  (macOS)
      - name: Decode signing keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > sign.jks

      - name: Build signed release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-configuration-cache

      - name: Create Git tag
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag ${{ steps.version.outputs.tag }} || true
          git push origin ${{ steps.version.outputs.tag }} || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Ivy Wallet M3 ${{ steps.version.outputs.tag }}"
          body: |
            **Version:** ${{ steps.version.outputs.name }} (build ${{ steps.version.outputs.code }})

            ### Install
            Download **app-release.apk** below and install it on your Android device (API 28+).

            > Signed with a private key. Not distributed via Google Play.

            ### What's new
            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md#whats-new-vs-upstream) for a full list of features added in this fork.
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
