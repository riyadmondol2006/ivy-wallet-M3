name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Cancel superseded runs on the same branch/PR for faster feedback and fewer wasted minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Detekt
        run: ./gradlew detekt --no-configuration-cache
      - name: Upload Detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: build/reports/detekt/detekt.html

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Android Lint (release)
        run: ./gradlew lintRelease --no-configuration-cache
      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: build/reports/lint/lint.html
      - name: Fail on lint errors
        run: |
          if grep -q 'severity="Error"' build/reports/lint/lint.xml; then
            echo "Lint errors found. Failing the build."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build demo APK
        run: ./gradlew assembleDemo --no-configuration-cache
      - name: Upload demo APK
        uses: actions/upload-artifact@v4
        with:
          name: ivy-wallet-demo-apk
          path: app/build/outputs/apk/demo/app-demo.apk
