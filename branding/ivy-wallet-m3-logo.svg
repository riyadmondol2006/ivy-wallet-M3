<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ivy Wallet M3 app logo (source).
  A simple, Material-style wallet: a white billfold with a clasp and a Material-amber card peeking
  out, on a Material green gradient squircle. Authored in the 108-unit adaptive-icon space, scaled to 512.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 108 108">
  <defs>
    <linearGradient id="ivyBg" x1="6" y1="6" x2="102" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#43C463"/>
      <stop offset="1" stop-color="#1E7D34"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="108" height="108" rx="25" ry="25" fill="url(#ivyBg)"/>

  <!-- amber card peeking out behind the wallet -->
  <rect x="40" y="28" width="30" height="18" rx="6" fill="#FFC93C"/>
  <!-- wallet body -->
  <rect x="24" y="42" width="60" height="34" rx="11" fill="#FFFFFF"/>
  <!-- clasp pocket -->
  <rect x="58" y="51" width="26" height="16" rx="8" fill="#EAF4ED"/>
  <!-- clasp button -->
  <circle cx="72" cy="59" r="3.8" fill="#1E7D34"/>
</svg>
